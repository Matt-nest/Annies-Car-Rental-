<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Annie's Car Rental" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Apple-touch-startup-image — eliminates the white-then-black flash
         between icon tap and React first paint on iOS PWAs. Each media
         query maps to a specific device class so iOS picks the right
         resolution. Generated from web-app-manifest-512x512.png on the
         portal theme color (#0A0A0A). -->
    <link rel="apple-touch-startup-image" href="/apple-splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-750x1334.png"  media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <title>Annie's Car Rental — Port St. Lucie, FL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Stripe SDK is lazy-loaded only on /confirm; preconnect cuts TLS time on first paint of the wizard -->
    <link rel="preconnect" href="https://js.stripe.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.stripe.com" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="preload" as="image" href="/hero-sentra-front.png" fetchpriority="high" />
    <meta name="description" content="Premium, reliable, and family-friendly car rentals located directly in Port St. Lucie. Skip the long lines at the airport and enjoy top-tier vehicles right in your neighborhood." />
  </head>
  <body>
    <div id="root"></div>
    <!-- Speculation Rules — Chrome/Edge 121+. Prerender /detail* (vehicle pages)
         and /portal* (returning customers) on hover/touchstart for ~moderate
         eagerness, so first-tap nav from the fleet grid feels instant. Browsers
         without this API just ignore the script. -->
    <script type="speculationrules">
    {
      "prerender": [
        { "where": { "href_matches": "/detail*" }, "eagerness": "moderate" },
        { "where": { "href_matches": "/portal*" }, "eagerness": "moderate" }
      ],
      "prefetch": [
        { "where": { "href_matches": "/confirm*" }, "eagerness": "conservative" }
      ]
    }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
